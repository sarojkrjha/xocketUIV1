name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Debug
        run: |
          pwd
          ls -lah
          cat package.json
          node -v
          npm -v
          
      - run: npm ci

      - run: npm run build

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_MUD_0F0DFAE10 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload

          app_location: "/"
          output_location: "dist"
          api_location: ""

          skip_app_build: true
